<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://images.emojiterra.com/google/android-oreo/512px/1f5fc.png">
    <link rel="icon" type="image/png" href="https://images.emojiterra.com/google/android-oreo/512px/1f5fc.png">
    <title>Leslie & Ruby 東京之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.011em;
        }
        .page-content {
            display: none;
        }
        .page-content.active {
            display: block;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <h1 class="text-lg font-black tracking-tight bg-gradient-to-r from-orange-600 via-rose-500 to-amber-500 bg-clip-text text-transparent">TOKYO • AUTUMN</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Leslie & Ruby Special Edition</p>
            </div>
            <div class="bg-rose-50 text-rose-600 px-3 py-1 rounded-full text-xs font-bold border border-rose-100 flex items-center space-x-1">
                <span>🗼</span>
                <span>10/01 - 10/06</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">

        <div id="itinerary" class="page-content active space-y-6">
            <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-1 sticky top-[69px] bg-slate-50/95 backdrop-blur z-40 py-2 border-b border-slate-100/50">
                <button onclick="showDay(1)" class="day-btn bg-rose-500 text-white px-4 py-2.5 rounded-2xl text-xs font-bold flex-shrink-0 transition-all shadow-sm" id="btn-day1">D1 • 10.01</button>
                <button onclick="showDay(2)" class="day-btn bg-white text-slate-500 px-4 py-2.5 rounded-2xl text-xs font-bold flex-shrink-0 border border-slate-100 transition-all" id="btn-day2">D2 • 10.02</button>
                <button onclick="showDay(3)" class="day-btn bg-white text-slate-500 px-4 py-2.5 rounded-2xl text-xs font-bold flex-shrink-0 border border-slate-100 transition-all" id="btn-day3">D3 • 10.03</button>
                <button onclick="showDay(4)" class="day-btn bg-white text-slate-500 px-4 py-2.5 rounded-2xl text-xs font-bold flex-shrink-0 border border-slate-100 transition-all" id="btn-day4">D4 • 10.04</button>
                <button onclick="showDay(5)" class="day-btn bg-white text-slate-500 px-4 py-2.5 rounded-2xl text-xs font-bold flex-shrink-0 border border-slate-100 transition-all" id="btn-day5">D5 • 10.05</button>
                <button onclick="showDay(6)" class="day-btn bg-white text-slate-500 px-4 py-2.5 rounded-2xl text-xs font-bold flex-shrink-0 border border-slate-100 transition-all" id="btn-day6">D6 • 10.06</button>
            </div>

            <div id="day4-content" class="day-section hidden space-y-5">
                <div class="bg-gradient-to-r from-teal-500 to-rose-500 p-4 rounded-3xl text-white shadow-sm">
                    <h3 class="font-extrabold text-base">Day 4：姆明北歐森林 ➔ 澀谷落日與甜點之夜</h3>
                </div>
                <div class="relative pl-6 border-l-2 border-slate-200/60 ml-2 space-y-6">
                    <div class="relative">
                        <span class="absolute -left-[31px] top-1 bg-white border-2 border-amber-500 w-4 h-4 rounded-full flex items-center justify-center"></span>
                        <span class="text-[10px] font-bold text-slate-400 block tracking-wider">19:15 - 21:00</span>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100/80 shadow-sm mt-1.5 space-y-2">
                            <h4 class="font-bold text-slate-800 text-sm">晚餐：SWEET CHECK</h4>
                            <p class="text-xs text-slate-500 leading-relaxed">澀谷精緻舒芙蕾蛋包飯，完美結束這一天的行程。</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="day6-content" class="day-section hidden space-y-5">
                <div class="bg-gradient-to-r from-slate-600 to-slate-800 p-4 rounded-3xl text-white shadow-sm">
                    <h3 class="font-extrabold text-base">Day 6：極味屋午餐 ➔ 東京車站採購 ➔ 機場</h3>
                </div>
                <div class="relative pl-6 border-l-2 border-slate-200/60 ml-2 space-y-6">
                    <div class="relative">
                        <span class="absolute -left-[31px] top-1 bg-white border-2 border-rose-600 w-4 h-4 rounded-full flex items-center justify-center"></span>
                        <span class="text-[10px] font-bold text-slate-400 block tracking-wider">12:00 - 14:00</span>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100/80 shadow-sm mt-1.5 space-y-2">
                            <h4 class="font-bold text-slate-800 text-sm">午餐：極味屋 (東京車站店)</h4>
                            <p class="text-xs text-slate-500 leading-relaxed">在東京車站內享受最後的和牛漢堡排！</p>
                        </div>
                    </div>
                    </div>
            </div>
            
            </div>
        </main>
    </body>
</html>
